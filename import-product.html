<button id="importBtn">Import Semua Produk</button>

<script type="module">

import { createClient } from 
"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

import { products } from "./products.js";


const supabaseUrl = "https://skzujzzzbbezclwzafoh.supabase.co";
const supabaseKey = "sb_publishable_TBcfRBo7Yl8OPkJvw4q_Xg_lvRLIGCy";


const supabase = createClient(
    "https://skzujzzzbbezclwzafoh.supabase.co",
    "sb_publishable_TBcfRBo7Yl8OPkJvw4q_Xg_lvRLIGCy"
);
document.getElementById("importBtn").onclick = async () => {

  console.log("Jumlah produk:", products.length);

  const { data, error } = await supabase
    .from("products")
    .insert(products);

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error){
    alert(error.message);
  } else {
    alert("Berhasil import " + products.length + " produk");
  }

};


</script>
